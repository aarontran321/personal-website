<style>
  /* ---------------------------------------------------------------
     Cursor image trail — tuning values
     (declared on :root so they reach the images in #cursorTrailLayer,
     which lives outside the hero section so the trail can span the
     whole page instead of just the hero box)
     --------------------------------------------------------------- */
  :root {
    --trail-spawn-distance: 90px;   /* min pointer travel before spawning a new image */
    --trail-hold-ms: 900;           /* ms an image stays fully visible before fading out (purely time-based, not count-based) */
    --trail-easing: cubic-bezier(0.03, 0.71, 0.31, 1.01);
    --trail-image-size: 160px;
    --trail-drift-duration: 600ms;  /* how long the post-spawn drift takes */
    --trail-drift-easing: cubic-bezier(0.16, 1, 0.3, 1);
  }

  .cursor-trail-layer {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    pointer-events: none;
    z-index: 500;
  }

  .cursor-trail-hero {
    position: relative;
    min-height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-color);
    cursor: crosshair;
  }

  .cursor-trail-hint {
    font-weight: 400;
    font-size: clamp(1.1rem, 2vw, 1.5rem);
    letter-spacing: 0.3px;
    color: var(--text-color);
    opacity: 0.35;
    pointer-events: none;
    user-select: none;
    margin: 0;
  }

  .trail-controls {
    position: absolute;
    left: 50%;
    bottom: 56px;
    transform: translateX(-50%);
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    max-width: min(90vw, 640px);
    z-index: 501;
  }

  .trail-control-btn {
    display: inline-flex;
    align-items: baseline;
    gap: 6px;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.01em;
    color: var(--text-color);
    background: var(--card-bg);
    border: 1px solid var(--btn-border);
    border-radius: 999px;
    padding: 10px 18px;
    cursor: pointer;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    transition: border-color 0.2s ease, box-shadow 0.25s ease, transform 0.15s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .trail-btn-label {
    opacity: 0.5;
    font-weight: 400;
  }

  .trail-btn-label::after {
    content: ':';
  }

  .trail-btn-value {
    font-weight: 600;
    color: var(--text-color);
    transition: color 0.2s ease;
  }

  .trail-control-btn:hover {
    border-color: #60a5fa;
    box-shadow: 0 8px 20px rgba(96, 165, 250, 0.16);
    transform: translateY(-3px);
  }

  .trail-control-btn:hover .trail-btn-value {
    color: #60a5fa;
  }

  .trail-control-btn:active {
    transform: translateY(-1px) scale(0.97);
    box-shadow: 0 3px 10px rgba(96, 165, 250, 0.14);
  }

  .trail-control-btn:focus-visible {
    outline: 2px solid #60a5fa;
    outline-offset: 2px;
  }

  .trail-img-outer {
    position: absolute;
    top: 0;
    left: 0;
    width: 0;
    height: 0;
    opacity: 0;
    transition: opacity 0.35s ease, transform var(--trail-drift-duration) var(--trail-drift-easing);
    pointer-events: none;
    will-change: transform;
  }

  .trail-img-outer.visible {
    opacity: 1;
  }

  .trail-img-inner {
    position: absolute;
    top: 0;
    left: 0;
    width: var(--trail-image-size);
    height: var(--trail-image-size);
    transform: translate(-50%, -50%) scale(0.4);
    transition: transform 0.5s var(--trail-easing), border-radius 0.3s ease;
    border-radius: var(--trail-shape-radius, 10px);
    overflow: hidden;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    pointer-events: none;
  }

  .trail-img-outer.visible .trail-img-inner {
    transform: translate(-50%, -50%) scale(1);
  }

  .trail-img-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    filter: var(--trail-filter, none);
  }
</style>

<script>
  (function () {
    // ---------------------------------------------------------------
    // Cursor image trail — tuning values (mirror the CSS custom
    // properties above; kept here too since JS needs plain numbers)
    // ---------------------------------------------------------------
    let SPAWN_DISTANCE = 90;     // px the pointer must travel before a new image spawns
    let HOLD_DURATION = 900;     // ms an image stays visible before it starts fading out —
                                  // purely time-based: an image is never removed early just
                                  // because more images have spawned since
    const FADE_FALLBACK_MS = 400; // safety-net removal delay if transitionend never fires
    const DRIFT_DISTANCE_SCALE = 6; // px of post-spawn drift per (px/ms) of cursor speed at spawn time
    const DRIFT_MAX_DISTANCE = 26;  // cap on drift distance — kept small so even a fast flick only drifts a little

    // Cycled by the on-page control buttons. Index 0 of each array must
    // match the button's default label in the HTML above.
    const CONTROL_PRESETS = {
      size: [
        { text: 'Small', value: '110px' },
        { text: 'Medium', value: '160px' },
        { text: 'Large', value: '220px' },
      ],
      shape: [
        { text: 'Rounded', value: '10px' },
        { text: 'Circle', value: '50%' },
        { text: 'Square', value: '0px' },
      ],
      density: [
        { text: 'Sparse', value: 140 },
        { text: 'Normal', value: 90 },
        { text: 'Dense', value: 50 },
      ],
      trail: [
        { text: 'Short', value: 500 },
        { text: 'Normal', value: 900 },
        { text: 'Long', value: 1500 },
      ],
      tint: [
        { text: 'Color', value: 'none' },
        { text: 'Grayscale', value: 'grayscale(1)' },
        { text: 'Sepia', value: 'sepia(0.85) saturate(1.3)' },
      ],
    };
    const controlState = { size: 1, shape: 0, density: 1, trail: 1, tint: 0 };

    const IMAGES = [
      '/images/gallery/firsthackathon.jpg',
      '/images/gallery/citynight.jpg',
      '/images/gallery/movienight.jpg',
      '/images/gallery/fishing.jpg',
      '/images/gallery/gamenight.jpg',
      '/images/gallery/canoe.jpg',
      '/images/gallery/sleephackathon.jpg',
      '/images/gallery/poolparty.jpg',
      '/images/gallery/beachwithfriends.jpg',
      '/images/gallery/studentcouncil.jpg',
      '/images/gallery/pokemonripnight.jpg',
    ];

    // Images are spawned into a fixed, full-viewport layer (not the hero
    // section) so the trail follows the cursor across the entire page.
    const container = document.getElementById('cursorTrailLayer');
    if (!container) return;

    let lastX = null;
    let lastY = null;
    let imageIndex = 0;

    // Instantaneous cursor velocity (px/ms), refreshed on every raw
    // pointermove so the drift direction/speed reflects how fast the
    // cursor was actually moving at the moment an image is generated —
    // independent of the (much coarser) spawn-distance gate below.
    let velX = 0;
    let velY = 0;
    let prevMoveX = null;
    let prevMoveY = null;
    let prevMoveTime = null;

    function spawnImage(x, y, vx, vy) {
      const outer = document.createElement('div');
      outer.className = 'trail-img-outer';
      outer.style.transform = `translate3d(${x}px, ${y}px, 0)`;

      const inner = document.createElement('div');
      inner.className = 'trail-img-inner';

      const img = document.createElement('img');
      img.src = IMAGES[imageIndex % IMAGES.length];
      imageIndex++;
      img.alt = '';
      img.draggable = false;

      inner.appendChild(img);
      outer.appendChild(inner);
      container.appendChild(outer);

      // Post-spawn drift: a small nudge in the direction of travel, scaled
      // by how fast the cursor was moving when this image was generated.
      // Capped tightly so it stays a subtle drift, never a big slide.
      const speed = Math.hypot(vx, vy); // px/ms
      const driftDist = Math.min(speed * DRIFT_DISTANCE_SCALE, DRIFT_MAX_DISTANCE);
      const driftX = speed > 0.0001 ? (vx / speed) * driftDist : 0;
      const driftY = speed > 0.0001 ? (vy / speed) * driftDist : 0;

      // One frame later so the transitions have a starting state to animate from.
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          outer.classList.add('visible');
          outer.style.transform = `translate3d(${x + driftX}px, ${y + driftY}px, 0)`;
        });
      });

      setTimeout(() => retireImage(outer), HOLD_DURATION);
    }

    // Purely time-based removal: an image lives for exactly HOLD_DURATION
    // before it starts fading, regardless of how many other images have
    // spawned since — there is no concurrency cap to enforce.
    function retireImage(outer) {
      if (!outer || outer.dataset.retiring) return;
      outer.dataset.retiring = 'true';

      const remove = () => {
        if (outer.parentNode) outer.parentNode.removeChild(outer);
      };

      outer.classList.remove('visible');
      outer.addEventListener('transitionend', remove, { once: true });
      setTimeout(remove, FADE_FALLBACK_MS);
    }

    // Listen on the whole window (not just the hero section) so the
    // trail follows the cursor over the header, footer, and everything
    // in between. The layer is `position: fixed`, so clientX/clientY
    // map onto it directly with no scroll-offset math needed.
    window.addEventListener('pointermove', (e) => {
      const x = e.clientX;
      const y = e.clientY;
      const now = performance.now();

      if (prevMoveX !== null) {
        const dt = now - prevMoveTime;
        if (dt > 0) {
          velX = (x - prevMoveX) / dt;
          velY = (y - prevMoveY) / dt;
        }
      }
      prevMoveX = x;
      prevMoveY = y;
      prevMoveTime = now;

      // No new images spawn once the cursor is over the footer — but any
      // image already spawned that happens to overlap it is left alone to
      // finish its normal fade-out, never cut off early. Queried fresh here
      // (rather than cached at script load) since this <script> runs before
      // <footer> exists in the DOM.
      const footer = document.querySelector('.site-footer');
      if (footer) {
        const footerRect = footer.getBoundingClientRect();
        const overFooter =
          y >= footerRect.top && y <= footerRect.bottom &&
          x >= footerRect.left && x <= footerRect.right;
        if (overFooter) {
          // Keep the spawn-gate baseline current so re-entering the
          // no-spawn zone doesn't leave stale distance to "cash in" the
          // moment the cursor steps back out over spawnable ground.
          lastX = x;
          lastY = y;
          return;
        }
      }

      if (lastX === null) {
        lastX = x;
        lastY = y;
        return;
      }

      const dist = Math.hypot(x - lastX, y - lastY);
      if (dist < SPAWN_DISTANCE) return;

      lastX = x;
      lastY = y;
      spawnImage(x, y, velX, velY);
    });

    const root = document.documentElement;

    function applyControl(name) {
      const preset = CONTROL_PRESETS[name][controlState[name]];
      if (name === 'size') root.style.setProperty('--trail-image-size', preset.value);
      if (name === 'shape') root.style.setProperty('--trail-shape-radius', preset.value);
      if (name === 'density') SPAWN_DISTANCE = preset.value;
      if (name === 'trail') HOLD_DURATION = preset.value;
      if (name === 'tint') root.style.setProperty('--trail-filter', preset.value);
    }

    document.querySelectorAll('.trail-control-btn').forEach((btn) => {
      const name = btn.dataset.control;
      const valueEl = btn.querySelector('.trail-btn-value');
      applyControl(name); // sync CSS vars / mutable tuning values with the default label
      btn.addEventListener('click', () => {
        controlState[name] = (controlState[name] + 1) % CONTROL_PRESETS[name].length;
        valueEl.textContent = CONTROL_PRESETS[name][controlState[name]].text;
        applyControl(name);
      });
    });
  })();
</script>
